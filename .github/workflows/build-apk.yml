name: 打包 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 安装 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 创建 www 目录并复制文件
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp -r resources www/ 2>/dev/null || true

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步资源
        run: npx cap sync android

      - name: 复制图标并配置 Android
        run: |
          # 复制图标
          for dir in mipmap-*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              target_dir="android/app/src/main/res/$dirname"
              rm -rf "$target_dir"
              mkdir -p "$target_dir"
              cp -f "$dir"* "$target_dir/"
              echo "已复制: $dirname"
            fi
          done
          
          # 配置 AndroidManifest.xml 使用传统图标
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q "android:icon" "$MANIFEST"; then
            echo "AndroidManifest.xml 已配置图标"
          else
            sed -i 's/<application /<application android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher" /' "$MANIFEST"
            echo "已添加图标配置到 AndroidManifest.xml"
          fi
          
          # 验证
          echo "=== 验证图标 ==="
          find android/app/src/main/res -name "ic_launcher.png" | wc -l

      - name: 编译 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小旅行-安装包
          path: android/app/build/outputs/apk/debug/app-debug.apk