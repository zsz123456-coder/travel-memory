name: 打包 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 安装 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 创建 www 目录并复制文件
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp -r resources www/ 2>/dev/null || true

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 复制图标到 Android 项目
        run: |
          # 遍历所有 mipmap 文件夹
          for dir in mipmap-*/; do
            if [ -d "$dir" ]; then
              target_dir="android/app/src/main/res/${dir%/}"
              mkdir -p "$target_dir"
              cp -r "$dir"* "$target_dir/" 2>/dev/null || true
              echo "已复制: $dir -> $target_dir"
            fi
          done
          echo "图标复制完成"

      - name: 同步资源
        run: npx cap sync android

      - name: 编译 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小旅行-安装包
          path: android/app/build/outputs/apk/debug/app-debug.apk