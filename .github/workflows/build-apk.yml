name: 打包 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 安装 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 创建 www 目录并复制文件
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp -r resources www/ 2>/dev/null || true

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步资源
        run: npx cap sync android

      - name: 复制图标并修复 AndroidManifest
        run: |
          # 1. 复制所有图标文件夹
          for dir in mipmap-*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              target_dir="android/app/src/main/res/$dirname"
              mkdir -p "$target_dir"
              cp -f "$dir"* "$target_dir/"
              echo "已复制: $dirname"
            fi
          done

          # 2. 删除任何可能导致自适应图标的残留文件夹
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          echo "已删除 mipmap-anydpi-v26 文件夹"

          # 3. 直接修改 AndroidManifest.xml，彻底移除对 ic_launcher_round 的引用
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"

          # 删除 android:roundIcon 属性
          sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST_PATH"

          # 确保 android:icon 属性存在且正确
          if grep -q 'android:icon=' "$MANIFEST_PATH"; then
            # 如果存在，替换其值为 @mipmap/ic_launcher
            sed -i 's|android:icon="@mipmap/[^"]*"|android:icon="@mipmap/ic_launcher"|g' "$MANIFEST_PATH"
          else
            # 如果不存在，在 <application 标签内添加
            sed -i 's|<application |<application android:icon="@mipmap/ic_launcher" |' "$MANIFEST_PATH"
          fi

          echo "已修复 AndroidManifest.xml"

      - name: 编译 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小旅行-安装包
          path: android/app/build/outputs/apk/debug/app-debug.apk