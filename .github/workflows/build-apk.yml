name: 打包 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 安装 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 创建 www 目录并复制文件
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp app.js www/
          cp -r resources www/ 2>/dev/null || true

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步资源
        run: npx cap sync android

      - name: 强制复制图标（在 sync 之后）
        run: |
          # 清空并重建图标目录
          for dir in mipmap-*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              target_dir="android/app/src/main/res/$dirname"
              rm -rf "$target_dir"
              mkdir -p "$target_dir"
              cp -f "$dir"* "$target_dir/"
              echo "✅ 已复制: $dirname"
            fi
          done
          
          # 删除自适应图标配置
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          
          # 修复 AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # 删除 roundIcon 引用
          sed -i 's/ android:roundIcon="@mipmap\/[^"]*"//g' "$MANIFEST"
          # 确保 icon 属性正确
          if grep -q 'android:icon=' "$MANIFEST"; then
            sed -i 's|android:icon="@mipmap/[^"]*"|android:icon="@mipmap/ic_launcher"|g' "$MANIFEST"
          else
            sed -i 's|<application |<application android:icon="@mipmap/ic_launcher" |' "$MANIFEST"
          fi
          
          # 验证图标是否存在
          echo "=== 验证图标 ==="
          find android/app/src/main/res -name "ic_launcher.png" | head -5
          ls -la android/app/src/main/res/mipmap-*/ic_launcher.png

      - name: 编译 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 小旅行-安装包
          path: android/app/build/outputs/apk/debug/app-debug.apk